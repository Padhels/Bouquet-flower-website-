<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk — Bloomie</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<section class="section">
  <div class="form-card">
    <img src="assets/icons/pixel-flower.svg" alt="" style="width:56px;margin:0 auto 12px">
    <h2>Selamat Datang Kembali</h2>
    <p class="sub">Masuk untuk lihat riwayat pesanan & wishlist kamu</p>
    <div class="form-error" id="formError"></div>
    <form id="loginForm">
      <div class="field"><label>Email</label><input type="email" id="loginEmail" required></div>
      <div class="field"><label>Password</label><input type="password" id="loginPassword" required></div>
      <button type="submit" class="btn btn-primary btn-block">Masuk</button>
    </form>
    <p class="form-foot">Belum punya akun? <a href="register.html">Daftar di sini</a></p>
  </div>
</section>

<div id="footer-placeholder"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  renderChrome('');
  document.getElementById('loginForm').addEventListener('submit', e=>{
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim().toLowerCase();
    const password = document.getElementById('loginPassword').value;
    const res = loginUser(email, password);
    const errEl = document.getElementById('formError');
    if(!res.ok){
      errEl.textContent = res.msg;
      errEl.style.display = 'block';
      return;
    }
    const redirect = sessionStorage.getItem('bloomie_redirect_after_login');
    sessionStorage.removeItem('bloomie_redirect_after_login');
    toast('Berhasil masuk \u2713');
    location.href = redirect || 'profile.html';
  });
</script>
</body>
</html>
