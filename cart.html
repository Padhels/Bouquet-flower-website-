<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keranjang — Bloomie</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="container">
  <div class="breadcrumb"><a href="index.html">Beranda</a> / Keranjang</div>
  <div class="section-head" style="text-align:left;margin-bottom:20px">
    <h2>Keranjang Belanja</h2>
  </div>
</div>

<div class="container cart-layout" id="cartLayout">
  <div id="cartItemsCol"></div>
  <div class="summary-box">
    <h3 style="margin-bottom:16px">Ringkasan Belanja</h3>
    <div class="summary-row"><span>Subtotal</span><span id="sumSubtotal">Rp0</span></div>
    <div class="summary-row"><span>Ongkos Kirim</span><span id="sumShipping">Rp0</span></div>
    <div class="summary-row total"><span>Total</span><span id="sumTotal">Rp0</span></div>
    <a href="checkout.html" class="btn btn-primary btn-block" id="checkoutBtn" style="margin-top:16px">Lanjut ke Checkout</a>
    <a href="catalog.html" class="btn btn-ghost btn-block" style="margin-top:8px">Lanjut Belanja</a>
  </div>
</div>

<div class="empty-state hidden" id="cartEmpty">
  <img src="assets/icons/empty-vase.svg" alt="">
  <p>Keranjang kamu masih kosong. Yuk pilih buket favoritmu!</p>
  <a href="catalog.html" class="btn btn-primary" style="margin-top:14px">Lihat Katalog</a>
</div>

<div id="footer-placeholder"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  renderChrome('cart');
  const SHIPPING_FLAT = 15000;
  const FREE_SHIPPING_MIN = 300000;

  function describeSelections(item){
    return (item.flowerSelections||[]).filter(s=>s.qty>0).map(s=>{
      const f = getFlower(s.id); return f ? `${f.name} x${s.qty}` : '';
    }).filter(Boolean).join(', ');
  }

  function render(){
    const cart = getCart();
    const layout = document.getElementById('cartLayout');
    const empty = document.getElementById('cartEmpty');
    if(cart.length === 0){
      layout.classList.add('hidden');
      empty.classList.remove('hidden');
      return;
    }
    layout.classList.remove('hidden');
    empty.classList.add('hidden');

    const col = document.getElementById('cartItemsCol');
    col.innerHTML = cart.map(item => {
      const product = getProduct(item.productId);
      const size = SIZES.find(s=>s.id===item.sizeId);
      const unit = cartItemUnitPrice(item);
      return `
      <div class="cart-item">
        <img src="${product.img}" alt="${product.name}">
        <div class="cart-item-info">
          <div class="name">${product.name}</div>
          <div class="meta">Ukuran: ${size.label}${describeSelections(item) ? ' \u2022 ' + describeSelections(item) : ''}</div>
          ${item.cardMessage ? `<div class="meta">\u2709 "${item.cardMessage.length>60?item.cardMessage.slice(0,60)+'...':item.cardMessage}"</div>` : ''}
          <div class="qty-row" style="justify-content:flex-start">
            <button data-act="minus" data-id="${item.cartId}">-</button>
            <span>${item.qty}</span>
            <button data-act="plus" data-id="${item.cartId}">+</button>
          </div>
          <div style="font-weight:700;color:var(--pink-deep);margin-top:6px">${formatIDR(unit * item.qty)}</div>
        </div>
        <button class="cart-item-remove" data-act="remove" data-id="${item.cartId}" aria-label="Hapus">&times;</button>
      </div>`;
    }).join('');

    col.querySelectorAll('button[data-act]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = btn.dataset.id;
        const item = getCart().find(i=>i.cartId===id);
        if(!item) return;
        if(btn.dataset.act === 'plus') updateCartItemQty(id, item.qty+1);
        if(btn.dataset.act === 'minus') updateCartItemQty(id, item.qty-1);
        if(btn.dataset.act === 'remove') removeFromCart(id);
        render();
      });
    });

    const subtotal = cartTotal();
    const shipping = subtotal >= FREE_SHIPPING_MIN || subtotal === 0 ? 0 : SHIPPING_FLAT;
    document.getElementById('sumSubtotal').textContent = formatIDR(subtotal);
    document.getElementById('sumShipping').textContent = shipping === 0 ? 'Gratis' : formatIDR(shipping);
    document.getElementById('sumTotal').textContent = formatIDR(subtotal + shipping);
  }
  render();
</script>
</body>
</html>
