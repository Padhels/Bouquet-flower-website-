<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riwayat Pesanan — Bloomie</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<section class="section">
  <div class="container">
    <div class="breadcrumb"><a href="index.html">Beranda</a> / Riwayat Pesanan</div>
    <div class="section-head" style="text-align:left"><h2>Riwayat Pesanan</h2></div>
    <div id="ordersList"></div>
    <div class="empty-state hidden" id="ordersEmpty">
      <img src="assets/icons/empty-vase.svg" alt="">
      <p>Belum ada pesanan nih. Yuk kirim bunga pertamamu!</p>
      <a href="catalog.html" class="btn btn-primary" style="margin-top:14px">Lihat Katalog</a>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  renderChrome('orders');
  if(!requireAuth()) { /* redirected */ }

  const orders = getMyOrders();
  const listEl = document.getElementById('ordersList');
  const emptyEl = document.getElementById('ordersEmpty');

  if(orders.length === 0){
    emptyEl.classList.remove('hidden');
  } else {
    listEl.innerHTML = orders.map(o => {
      const date = new Date(o.createdAt).toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
      const thumbs = o.items.map(it => `<img src="${getProduct(it.productId).img}" alt="">`).join('');
      return `
      <div class="order-card">
        <div class="order-head">
          <div>
            <strong>${o.id}</strong>
            <div style="font-size:0.8rem;color:var(--ink-soft)">${date}</div>
          </div>
          <span class="order-status ${o.status==='paid'?'paid':'pending'}">${o.status==='paid'?'Sudah Dibayar':'Menunggu Pembayaran'}</span>
        </div>
        <div class="order-items-mini">${thumbs}</div>
        <div class="flex" style="justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
          <div style="font-size:0.86rem;color:var(--ink-soft)">Dikirim ke ${o.address.recipient}, ${o.address.city}</div>
          <div style="font-weight:700;color:var(--pink-deep)">${formatIDR(o.total)}</div>
        </div>
      </div>`;
    }).join('');
  }
</script>
</body>
</html>
