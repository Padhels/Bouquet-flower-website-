<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist — Bloomie</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<section class="section">
  <div class="container">
    <div class="breadcrumb"><a href="index.html">Beranda</a> / Wishlist</div>
    <div class="section-head" style="text-align:left"><h2>Wishlist Kamu</h2></div>
    <div class="grid" id="wishGrid"></div>
    <div class="empty-state hidden" id="wishEmpty">
      <img src="assets/icons/empty-vase.svg" alt="">
      <p>Belum ada buket favorit tersimpan. Yuk jelajahi katalog kami!</p>
      <a href="catalog.html" class="btn btn-primary" style="margin-top:14px">Lihat Katalog</a>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  renderChrome('wishlist');

  function render(){
    const ids = getWishlist();
    const grid = document.getElementById('wishGrid');
    const empty = document.getElementById('wishEmpty');
    if(ids.length === 0){
      grid.classList.add('hidden');
      empty.classList.remove('hidden');
      return;
    }
    grid.classList.remove('hidden');
    empty.classList.add('hidden');
    const items = ids.map(getProduct).filter(Boolean);
    grid.innerHTML = items.map(p => `
      <div class="card">
        <div class="card-media">
          <a href="product.html?id=${p.id}"><img src="${p.img}" alt="${p.name}"></a>
          <button class="wish-btn active" data-id="${p.id}" aria-label="Hapus dari wishlist">
            <img src="assets/icons/heart-outline.svg" width="18" height="18" alt="">
          </button>
        </div>
        <div class="card-body">
          <span class="card-cat">${p.badge||''}</span>
          <a href="product.html?id=${p.id}"><h3 class="card-title">${p.name}</h3></a>
          <span class="card-price">${formatIDR(p.price)}</span>
        </div>
        <div class="card-foot"><a href="product.html?id=${p.id}" class="btn btn-primary btn-sm btn-block">Lihat Detail</a></div>
      </div>`).join('');

    grid.querySelectorAll('.wish-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        toggleWishlist(btn.dataset.id);
        render();
      });
    });
  }
  render();
</script>
</body>
</html>
